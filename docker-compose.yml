services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: toolhub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-toolhub_root_pwd}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-toolhub}
      MYSQL_USER: ${MYSQL_USER:-toolhub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-toolhub_pwd}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - toolhub-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: toolhub-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-toolhub}:${MYSQL_PASSWORD:-toolhub_pwd}@mysql:3306/${MYSQL_DATABASE:-toolhub}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-to-a-secure-random-string}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_BASE_URL: ${FEISHU_BASE_URL:-https://open.feishu.cn/open-apis}
      FEISHU_REDIRECT_URI: ${FEISHU_REDIRECT_URI:-http://localhost:5173/auth/callback}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:5174","http://localhost:3000","http://localhost:80","http://localhost:81"]'
      DEBUG: ${DEBUG:-false}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - toolhub-network

  # Admin Frontend
  admin:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    container_name: toolhub-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-81}:80"
    depends_on:
      - backend
    networks:
      - toolhub-network

  # Client Frontend
  client:
    build:
      context: ./frontend/client
      dockerfile: Dockerfile
    container_name: toolhub-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - toolhub-network

volumes:
  mysql_data:

networks:
  toolhub-network:
    driver: bridge
